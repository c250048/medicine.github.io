<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服薬チェッカー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .date-display {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .check-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .check-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .check-item:last-child {
            margin-bottom: 0;
        }

        .check-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .check-item.checked {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .check-label {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
        }

        .check-label::before {
            content: '';
            margin-right: 15px;
            font-size: 24px;
        }

        .check-item[data-time="morning"] .check-label::before {
            content: '🌅';
        }

        .check-item[data-time="evening"] .check-label::before {
            content: '🌙';
        }

        .checkbox {
            width: 30px;
            height: 30px;
            border: 3px solid #ddd;
            border-radius: 8px;
            position: relative;
            transition: all 0.3s ease;
        }

        .check-item.checked .checkbox {
            background: #667eea;
            border-color: #667eea;
        }

        .check-item.checked .checkbox::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .clear-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: #ee5a52;
            transform: translateY(-1px);
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }

        .history-item {
            background: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
            color: #555;
            border-left: 4px solid #667eea;
        }

        .history-item:last-child {
            margin-bottom: 0;
        }

        .history-empty {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        .status-message {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
        }

        .status-complete {
            background: #d4edda;
            color: #155724;
        }

        .status-incomplete {
            background: #fff3cd;
            color: #856404;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .check-label {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>💊 服薬チェッカー</h1>
        <div class="date-display" id="dateDisplay"></div>

        <div class="check-section">
            <div class="check-item" data-time="morning" onclick="toggleCheck('morning')">
                <div class="check-label">朝の薬</div>
                <div class="checkbox"></div>
            </div>
            <div class="check-item" data-time="evening" onclick="toggleCheck('evening')">
                <div class="check-label">晩の薬</div>
                <div class="checkbox"></div>
            </div>
        </div>

        <div id="statusMessage"></div>

        <div style="text-align: center; margin-bottom: 20px; font-size: 12px; color: #999;">
            <span id="syncStatus">📱 ローカル保存のみ</span>
        </div>

        <div class="history-section">
            <div class="history-header">
                <div class="history-title">📋 履歴</div>
                <button class="clear-btn" onclick="clearHistory()">履歴削除</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // Google Apps Script のウェブアプリURL（Step 2 でコピーしたURLを貼り付け）
        const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7KOzt_c_PymCIJ4L23rjLzZegAzieHtO-m8Ut8-D3Ylw9M6QGBE5SZLiFrUfTzIoJ0A/exec";

        // 日付をフォーマット
        function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日（${weekday}）`;
        }

        // 今日の日付キーを取得
        function getTodayKey() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        // 日付表示を更新
        function updateDateDisplay() {
            document.getElementById('dateDisplay').textContent = formatDate(new Date());
        }

        // チェック状態を取得
        function getCheckStatus() {
            const todayKey = getTodayKey();
            const data = JSON.parse(localStorage.getItem('medicineCheck') || '{}');
            return data[todayKey] || { morning: false, evening: false };
        }

        // チェック状態を保存
        function saveCheckStatus(time, checked) {
            const todayKey = getTodayKey();
            const data = JSON.parse(localStorage.getItem('medicineCheck') || '{}');

            if (!data[todayKey]) {
                data[todayKey] = { morning: false, evening: false };
            }

            data[todayKey][time] = checked;
            localStorage.setItem('medicineCheck', JSON.stringify(data));

            // 履歴を保存
            if (checked) {
                saveHistory(time);
            }
        }

        // 履歴を保存
        function saveHistory(time) {
            const history = JSON.parse(localStorage.getItem('medicineHistory') || '[]');
            const now = new Date();
            const timeLabel = time === 'morning' ? '朝' : '晩';

            const historyItem = {
                date: formatDate(now),
                time: timeLabel,
                timestamp: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
            };

            history.unshift(historyItem);

            // 最新50件まで保存
            if (history.length > 50) {
                history.pop();
            }

            localStorage.setItem('medicineHistory', JSON.stringify(history));

            // Google Sheet に送信
            sendToGoogleSheet(historyItem);

            updateHistoryDisplay();
        }

        // Google Sheet に送信
        function sendToGoogleSheet(data) {
            if (!GOOGLE_APPS_SCRIPT_URL || GOOGLE_APPS_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbx7KOzt_c_PymCIJ4L23rjLzZegAzieHtO-m8Ut8-D3Ylw9M6QGBE5SZLiFrUfTzIoJ0A/exec") {
                console.log("Google Apps Script URL が未設定です");
                return;
            }

            fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data),
                mode: 'no-cors'
            })
                .catch(error => console.log("Google Sheet への送信結果:", error));
        }

        // チェックをトグル
        function toggleCheck(time) {
            const item = document.querySelector(`.check-item[data-time="${time}"]`);
            const currentStatus = getCheckStatus();
            const newStatus = !currentStatus[time];

            if (newStatus) {
                item.classList.add('checked');
            } else {
                item.classList.remove('checked');
            }

            saveCheckStatus(time, newStatus);
            updateStatusMessage();
        }

        // ステータスメッセージを更新
        function updateStatusMessage() {
            const status = getCheckStatus();
            const messageDiv = document.getElementById('statusMessage');

            if (status.morning && status.evening) {
                messageDiv.className = 'status-message status-complete';
                messageDiv.textContent = '✨ 本日の服薬完了！';
            } else if (status.morning || status.evening) {
                messageDiv.className = 'status-message status-incomplete';
                const remaining = [];
                if (!status.morning) remaining.push('朝');
                if (!status.evening) remaining.push('晩');
                messageDiv.textContent = `⚠️ ${remaining.join('・')}の薬を忘れずに！`;
            } else {
                messageDiv.className = 'status-message status-incomplete';
                messageDiv.textContent = '📝 今日の服薬をチェックしましょう';
            }
        }

        // 履歴表示を更新
        function updateHistoryDisplay() {
            const history = JSON.parse(localStorage.getItem('medicineHistory') || '[]');
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">まだ履歴がありません</div>';
                return;
            }

            historyList.innerHTML = history.map(item =>
                `<div class="history-item">${item.date} ${item.time} - ${item.timestamp}</div>`
            ).join('');
        }

        // 履歴を削除
        function clearHistory() {
            if (confirm('本当に履歴を削除しますか？')) {
                localStorage.removeItem('medicineHistory');
                updateHistoryDisplay();
            }
        }

        // 初期化
        function init() {
            updateDateDisplay();
            updateSyncStatus();
            const status = getCheckStatus();

            if (status.morning) {
                document.querySelector('.check-item[data-time="morning"]').classList.add('checked');
            }
            if (status.evening) {
                document.querySelector('.check-item[data-time="evening"]').classList.add('checked');
            }

            updateStatusMessage();
            updateHistoryDisplay();

            // 日付が変わったらリセット（毎分チェック）
            setInterval(() => {
                const currentKey = getTodayKey();
                if (currentKey !== window.lastCheckedDate) {
                    window.lastCheckedDate = currentKey;
                    location.reload();
                }
            }, 60000);

            window.lastCheckedDate = getTodayKey();
        }

        // Google Sheet 同期状態を表示
        function updateSyncStatus() {
            const statusEl = document.getElementById('syncStatus');
            if (GOOGLE_APPS_SCRIPT_URL && GOOGLE_APPS_SCRIPT_URL !== "https://script.google.com/macros/s/AKfycbx7KOzt_c_PymCIJ4L23rjLzZegAzieHtO-m8Ut8-D3Ylw9M6QGBE5SZLiFrUfTzIoJ0A/exec") {
                statusEl.textContent = '☁️ Google Sheet に同期';
                statusEl.style.color = '#28a745';
            } else {
                statusEl.textContent = '📱 ローカル保存のみ';
                statusEl.style.color = '#999';
            }
        }

        // ページ読み込み時に初期化
        init();
    </script>
</body>

</html>
